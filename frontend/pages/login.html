<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICDS | Secure Login</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <h1>ICDS</h1>
        <p>Intelligent Cancer Detection System</p>
      </div>

      <div class="login-form">
        <div id="successAlert" class="alert alert-success">
          <i class="fas fa-check-circle"></i>
          <span id="successMessage">Login successful! Redirecting...</span>
        </div>

        <div id="errorAlert" class="alert alert-error">
          <i class="fas fa-exclamation-circle"></i>
          <span id="errorMessage">Invalid email or password</span>
        </div>

        <div id="infoAlert" class="alert alert-info">
          <i class="fas fa-info-circle"></i>
          <span id="infoMessage">Checking credentials...</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-group">
              <i class="fas fa-envelope input-icon"></i>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="doctor@hospital.org"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-group">
              <i class="fas fa-lock input-icon"></i>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
              />
              <i
                class="fas fa-eye toggle-password"
                onclick="togglePassword()"
                id="toggleIcon"
              ></i>
            </div>
          </div>

          <div class="form-options">
            <div class="remember-me">
              <input type="checkbox" id="remember" />
              <label for="remember">Remember me</label>
            </div>
            <a href="#" class="forgot-password" onclick="forgotPassword()">
              Forgot Password?
            </a>
          </div>

          <button type="submit" class="btn btn-primary" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Sign In
          </button>
        </form>

        <div class="divider">
          <span>New to ICDS?</span>
        </div>

        <div class="login-footer">
          <p>
            Don't have an account?
            <a href="register.html">Register your hospital</a>
          </p>
          <p style="margin-top: 12px; font-size: 11px; color: var(--gray-400)">
            <i class="fas fa-shield-alt"></i> HIPAA Compliant | Secure Login
          </p>
        </div>
      </div>
    </div>

    <script src="../utils/env.js"></script>
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
